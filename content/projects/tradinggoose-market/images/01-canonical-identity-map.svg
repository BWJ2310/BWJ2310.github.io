  <text x="1170" y="274" fill="#3a7c6b" font-family="Arial, sans-serif" font-size="24">601988.SS</text>

  <rect x="1138" y="340" width="360" height="112" rx="16" fill="#fffdf8" stroke="#4870a8" stroke-width="3"/>
  <text x="1170" y="388" fill="#151515" font-family="Arial, sans-serif" font-size="24" font-weight="700">Finnhub</text>
  <text x="1170" y="426" fill="#4870a8" font-family="Arial, sans-serif" font-size="24">601988.SHG</text>

  <rect x="1138" y="492" width="360" height="112" rx="16" fill="#fffdf8" stroke="#af5d4c" stroke-width="3"/>
  <text x="1170" y="540" fill="#151515" font-family="Arial, sans-serif" font-size="24" font-weight="700">Alpha Vantage</text>
  <text x="1170" y="578" fill="#af5d4c" font-family="Arial, sans-serif" font-size="24">601988 + exchange</text>

  <rect x="80" y="674" width="1418" height="108" rx="18" fill="#fffdf8" stroke="#cfc6b4" stroke-width="2"/>
  <text x="116" y="724" fill="#151515" font-family="Arial, sans-serif" font-size="26" font-weight="700">Reference-data API</text>
  <text x="116" y="762" fill="#5c5a55" font-family="Arial, sans-serif" font-size="20">Listings, exchanges, markets, countries, cities, currencies, time zones, blockchain networks, trading hours.</text>
