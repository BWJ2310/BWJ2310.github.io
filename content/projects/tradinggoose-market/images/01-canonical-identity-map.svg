<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TradingGoose-Market canonical ticker identity map</title>
  <desc id="desc">Diagram showing one canonical listing context translated into provider-specific ticker symbols by client-side rules.</desc>
  <rect width="1600" height="900" fill="#f7f5ef"/>
  <path d="M0 160H1600M0 320H1600M0 480H1600M0 640H1600M0 800H1600M160 0V900M320 0V900M480 0V900M640 0V900M800 0V900M960 0V900M1120 0V900M1280 0V900M1440 0V900" stroke="#ded8cb" stroke-width="1"/>
  <text x="80" y="92" fill="#151515" font-family="Arial, sans-serif" font-size="48" font-weight="700">TradingGoose-Market</text>
  <text x="80" y="134" fill="#5c5a55" font-family="Arial, sans-serif" font-size="22">Canonical identity stays stable; provider symbols are rendered at the client edge.</text>

  <rect x="80" y="220" width="390" height="350" rx="18" fill="#fffdf8" stroke="#1d1d1d" stroke-width="3"/>
  <rect x="108" y="248" width="190" height="34" rx="17" fill="#f3c934"/>
  <text x="128" y="272" fill="#151515" font-family="Arial, sans-serif" font-size="18" font-weight="700">Canonical Listing</text>
  <text x="112" y="330" fill="#151515" font-family="Arial, sans-serif" font-size="34" font-weight="700">TG_LSTG_0001</text>
  <text x="112" y="380" fill="#151515" font-family="Arial, sans-serif" font-size="22">base: 601988</text>
  <text x="112" y="418" fill="#151515" font-family="Arial, sans-serif" font-size="22">asset class: stock</text>
  <text x="112" y="456" fill="#151515" font-family="Arial, sans-serif" font-size="22">market: SHG</text>
  <text x="112" y="494" fill="#151515" font-family="Arial, sans-serif" font-size="22">country: CN</text>
  <text x="112" y="532" fill="#151515" font-family="Arial, sans-serif" font-size="22">timezone: Asia/Shanghai</text>

  <rect x="608" y="220" width="385" height="350" rx="18" fill="#151515" stroke="#151515" stroke-width="3"/>
  <text x="644" y="278" fill="#f7f5ef" font-family="Arial, sans-serif" font-size="30" font-weight="700">Client Rule Layer</text>
  <text x="644" y="326" fill="#e8dfc4" font-family="Arial, sans-serif" font-size="21">Filter active mapping rules</text>
  <text x="644" y="370" fill="#e8dfc4" font-family="Arial, sans-serif" font-size="21">Score provider precedence</text>
  <text x="644" y="414" fill="#e8dfc4" font-family="Arial, sans-serif" font-size="21">Render symbol template</text>
  <rect x="644" y="466" width="305" height="52" rx="10" fill="#f3c934"/>
  <text x="674" y="500" fill="#151515" font-family="Arial, sans-serif" font-size="21" font-weight="700">template: {base}{suffix}</text>

  <path d="M495 395H575" stroke="#151515" stroke-width="5" stroke-linecap="round"/>
  <path d="M575 395L555 378M575 395L555 412" stroke="#151515" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1017 395H1097" stroke="#151515" stroke-width="5" stroke-linecap="round"/>
  <path d="M1097 395L1077 378M1097 395L1077 412" stroke="#151515" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="1138" y="188" width="360" height="112" rx="16" fill="#fffdf8" stroke="#3a7c6b" stroke-width="3"/>
